<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<div class="container">
    <h1>Spring boot with Payment Gateway</h1>

    <table >
        <tr>
            <td>Enter Name:</td>
            <td>
                <input type="text"  name="name" id="name" class="form-control"/>
            </td>
        </tr>
        <tr>
            <td>Enter Email:</td>
            <td>
                <input type="email"  name="Email" id="email" class="form-control" required/>
            </td>
        </tr>
        <tr>
            <td>Phone Number:</td>
            <td>
                <input type="number"  name="phno" id="phno" class="form-control" required/>
            </td>
        </tr>

        <tr>
            <td>Select Course:</td>
            <td>
                <select name="Course" id="course" class="form-select" aria-label="Large select example" required >
                    <option selected >-Select Course-</option>
                    <option value="java" >Java</option>
                    <option value="pyhton" >Python</option>
                    <option value="devops" >DevOps</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>Amount:</td>
            <td>
                <input type="number"  name="Amount" id="amount" class="form-control" required/>
            </td>
        </tr>
        <tr>
            <td></td>
            <td><button id="rzp-button1" class="btn btn-primary">Pay</button></td>
        </tr>

    </table>
</div>

<!--&lt;!&ndash;Predefined java script file given by razorpay peoples - -->
<!--so card validation amount dedection and etc every thing will be takecare by this js file &ndash;&gt;-->
<script src="http://checkout.razorpay.com/v1/checkout.js"></script>

<script>
    async function createOrder(){
    console.log("-------Order creation started");
    const response = await fetch('http://localhost:8080/create-order', {
    method: 'POST',
    headers: {
    'Content-Type': 'application/json'
    },
    body: JSON.stringify({
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phno').value,
    course: document.getElementById('course').value,
    amount: document.getElementById('amount').value,
    currency: 'INR'
    })
    });

    const order = await response.json();
    console.log("-------Order creation completed-------");
    return order;
    }

    document.getElementById('rzp-button1').onclick = async function(e){
    e.preventDefault();
    const order = await createOrder();
    console.log(order);
    console.log("Order ID =", order.razorpayOrderId);

    var options = {
    "key" : "rzp_test_T9N7DfVM6uuUeH",
    "amount" : order.Amount,
    "currency" : "INR",
    "name":"Manvik Sagar",
    "description" : "Course Payment",
    "order_id" : order.razorpayOrderId,
    "receipt" : order.Email,
    "callback_url" : "http://localhost:8080/handle-payment-callback",
    "prefill" : {
             "name" : order.name,
             "email" : order.Email,
             "phone" : order.phno
    },
    "theme" : {
             "color" : "#3999cc"
    }
    };
    var rzpl = new Razorpay(options);
<!--    this open razorpay paymant page   -->
    rzpl.open();
    e.preventDefault();
    }

</script>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
